<html lang="tr">
<head>
  <meta charset="UTF-8" />

  <link rel="alternate" href="https://typingspeedtest.co/" hreflang="en" />

  <link rel="alternate" href="https://typingspeedtest.co/tr/" hreflang="tr" />
  <link rel="alternate" href="https://typingspeedtest.co/ar/" hreflang="ar" />
  <link rel="alternate" href="https://typingspeedtest.co/fr/" hreflang="fr" />
  <link rel="alternate" href="https://typingspeedtest.co/el/" hreflang="el" />
  <link rel="alternate" href="https://typingspeedtest.co/ru/" hreflang="ru" />
  <link rel="alternate" href="https://typingspeedtest.co/pt/" hreflang="pt" />
  <link rel="alternate" href="https://typingspeedtest.co/cn/" hreflang="zh" />
  <link rel="alternate" href="https://typingspeedtest.co/jp/" hreflang="ja" />

  <meta property="og:title" content="Yazma Hızı Testi" />
  <meta property="og:description" content="3D arka planlı modern arayüz. Gerçek zamanlı WPM, CPM, doğruluk ve liderlik tablosu." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://typingspeedtest.co/tr/" />
  <title>Yazma Hızı Testi</title>
  <link rel="stylesheet" href="../assets/style.css">
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js" defer></script>

  <!-- Schema.org JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Typing Speed Test",
    "url": "https://typingspeedtest.co/tr/",
    "inLanguage": "tr",
    "description": "Modern arayüz ve 3D arka plan ile yazma hızı testi. WPM, CPM, doğruluk ve liderlik tablosu.",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "Any",
    "publisher": { "@type": "Organization", "name": "Typing Speed Test" },
    "potentialAction": { "@type": "UseAction", "target": { "@type": "EntryPoint", "urlTemplate": "https://typingspeedtest.co/tr/#test" } }
  }
  </script>
</head>
<body>
  <canvas id="bg3d" aria-hidden="true"></canvas>
  <a class="sr-only skip-link" href="#test">Teste atla</a>

  <header class="site-header" role="banner">
    <div class="container">
      <div class="brand"><span class="logo" aria-hidden="true">⌨️</span><h1 class="app-title">Yazma Hızı Testi</h1></div>
      <div class="header-actions">
        <div class="lang-switch">
          <label for="siteLangSwitch" class="visually-hidden">Dil</label>
          <select id="siteLangSwitch" aria-label="Site dili">
            <option value="/">EN</option><option value="/es/">ES</option><option value="/de/">DE</option><option value="/tr/">TR</option><option value="/ar/">AR</option><option value="/fr/">FR</option><option value="/el/">EL</option><option value="/ru/">RU</option><option value="/pt/">PT</option><option value="/cn/">CN</option><option value="/jp/">JP</option>
          </select>
        </div>
        <button id="themeToggle" class="btn btn-ghost" aria-pressed="false" aria-label="Tema">Koyu</button>
      </div>
    </div>
  </header>

  <main id="main" class="container" role="main">
    <section class="hero card"><div class="hero-content"><h2 class="hero-title">Daha hızlı. Daha doğru.</h2><p class="hero-sub">Neon arayüz, 3D arka plan ve uzun pasajlarla dayanıklılık antrenmanı.</p></div></section>
    <!-- replicate main UI from root -->
    <section aria-labelledby="controls-heading" class="card controls glass" role="region">
      <h2 id="controls-heading" class="visually-hidden">Kontroller</h2>
      <div class="controls-grid">
        <div class="control"><label for="modeSelect">Mod</label><select id="modeSelect"><option value="time">Süre</option><option value="words">Kelime</option></select></div>
        <div class="control" id="timeControl"><label for="timeSelect">Süre</label><select id="timeSelect"><option value="15">15s</option><option value="30">30s</option><option value="60" selected>60s</option><option value="120">120s</option><option value="custom">Özel…</option></select><input id="timeCustom" type="number" min="5" step="5" placeholder="Saniye" class="hidden" aria-label="Özel saniye"></div>
        <div class="control hidden" id="wordsControl"><label for="wordsSelect">Kelime</label><select id="wordsSelect"><option value="50">50</option><option value="150" selected>150</option><option value="300">300</option><option value="600">600</option></select></div>
        <div class="control"><label for="langSelect">Metin dili</label><select id="langSelect"><option value="en" selected>English</option><option value="ur">Urdu</option><option value="es">Español</option></select></div>
        <div class="control"><label for="layoutSelect">Klavye</label><select id="layoutSelect"><option value="qwerty" selected>QWERTY</option><option value="azerty">AZERTY</option></select></div>
        <div class="control toggles"><div class="toggle"><input type="checkbox" id="showPunct" checked><label for="showPunct">Noktalama</label></div><div class="toggle"><input type="checkbox" id="strictCaps"><label for="strictCaps">Büyük harf</label></div><div class="toggle"><input type="checkbox" id="showKeyboard"><label for="showKeyboard">Klavye ipuçları</label></div><div class="toggle"><input type="checkbox" id="keystrokeLog"><label for="keystrokeLog">Tuş kaydı</label></div></div>
      </div>
      <details class="custom-text"><summary>Özel metin kullan</summary><textarea id="customText" rows="3" placeholder="Metni buraya yapıştırın…"></textarea></details>
      <div class="actions"><button id="startBtn" class="btn btn-primary accent">Başlat</button><button id="resetBtn" class="btn btn-ghost" disabled>Sıfırla</button></div>
    </section>

    <section class="card test glass" id="test"><div id="passage" class="passage neon" lang="tr" dir="ltr" aria-live="polite"></div><div class="screen-readers" aria-live="assertive" aria-atomic="true"><span id="sr-current"></span></div><input id="hiddenInput" class="hidden-input" autocomplete="off" autocapitalize="none" spellcheck="false" inputmode="text" aria-label="Girdi"/><div id="keyboard" class="keyboard hidden" aria-hidden="true"></div></section>
    <section class="card metrics glass"><div class="metrics-grid"><div class="metric"><span class="label">WPM</span><span id="wpm" class="value">0</span></div><div class="metric"><span class="label">CPM</span><span id="cpm" class="value">0</span></div><div class="metric"><span class="label">Doğruluk</span><span id="accuracy" class="value">100%</span></div><div class="metric"><span class="label">Hata</span><span id="errors" class="value">0</span></div><div class="metric"><span class="label">Zaman</span><span id="time" class="value">0s</span></div><div class="metric"><span class="label">Ort. WPM</span><span id="avgWpm" class="value">0</span></div></div><canvas id="sparkline" height="40" role="img" aria-label="WPM"></canvas></section>
  </main>

  <footer class="site-footer"><div class="container"><p>&copy; 2025 Typing Speed Test • <a href="/">Home</a> • <a href="/about.html">About</a> • <a href="/contact.html">Contact</a> • <a href="/terms.html">Terms</a> • <a href="/privacy.html">Privacy</a> • <a href="/disclaimer.html">Disclaimer</a></p></div></footer>
  <script src="../assets/script.js" defer></script>
</body>
</html>
