<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="モダンUIと3D背景のタイピング速度テスト。WPM、精度、ランキング。" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://typingspeedtest.co/jp/" />
  <meta property="og:title" content="タイピング速度テスト" />
  <meta property="og:description" content="3D背景のモダンUI。リアルタイムWPM、CPM、精度、ランキング。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://typingspeedtest.co/jp/" />
  <title>タイピング速度テスト</title>
  <link rel="stylesheet" href="../assets/style.css">
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js" defer></script>
</head>
<body>
  <canvas id="bg3d" aria-hidden="true"></canvas>
  <a class="sr-only skip-link" href="#test">テストへ移動</a>

  <header class="site-header"><div class="container">
    <div class="brand"><span class="logo" aria-hidden="true">⌨️</span><h1 class="app-title">タイピング速度テスト</h1></div>
    <div class="header-actions">
      <div class="lang-switch">
        <label for="siteLangSwitch" class="visually-hidden">言語</label>
        <select id="siteLangSwitch" aria-label="サイト言語">
          <option value="/">EN</option><option value="/es/">ES</option><option value="/de/">DE</option><option value="/tr/">TR</option><option value="/ar/">AR</option><option value="/fr/">FR</option><option value="/el/">EL</option><option value="/ru/">RU</option><option value="/pt/">PT</option><option value="/cn/">CN</option><option value="/jp/">JP</option>
        </select>
      </div>
      <button id="themeToggle" class="btn btn-ghost" aria-pressed="false">ダーク</button>
    </div>
  </div></header>

  <main id="main" class="container" role="main">
    <section class="hero card"><div class="hero-content"><h2 class="hero-title">速く。正確に。</h2><p class="hero-sub">ネオンUI、3D背景、長文パッセージで持久力を鍛える。</p></div></section>
    <section class="card controls glass"><div class="controls-grid">
      <div class="control"><label for="modeSelect">モード</label><select id="modeSelect"><option value="time">時間</option><option value="words">単語数</option></select></div>
      <div class="control" id="timeControl"><label for="timeSelect">時間</label><select id="timeSelect"><option value="15">15s</option><option value="30">30s</option><option value="60" selected>60s</option><option value="120">120s</option><option value="custom">カスタム…</option></select><input id="timeCustom" type="number" class="hidden" placeholder="秒"></div>
      <div class="control hidden" id="wordsControl"><label for="wordsSelect">単語数</label><select id="wordsSelect"><option value="50">50</option><option value="150" selected>150</option><option value="300">300</option><option value="600">600</option></select></div>
      <div class="control"><label for="langSelect">テキスト言語</label><select id="langSelect"><option value="en" selected>English</option><option value="ur">Urdu</option><option value="es">Español</option></select></div>
      <div class="control"><label for="layoutSelect">キーボード</label><select id="layoutSelect"><option value="qwerty" selected>QWERTY</option><option value="azerty">AZERTY</option></select></div>
      <div class="control toggles"><div class="toggle"><input type="checkbox" id="showPunct" checked><label for="showPunct">句読点</label></div><div class="toggle"><input type="checkbox" id="strictCaps"><label for="strictCaps">大文字厳密</label></div><div class="toggle"><input type="checkbox" id="showKeyboard"><label for="showKeyboard">キーボードヒント</label></div><div class="toggle"><input type="checkbox" id="keystrokeLog"><label for="keystrokeLog">キー入力ログ</label></div></div>
    </div><details class="custom-text"><summary>カスタムテキスト</summary><textarea id="customText" rows="3" placeholder="ここに貼り付け…"></textarea></details><div class="actions"><button id="startBtn" class="btn btn-primary accent">開始</button><button id="resetBtn" class="btn btn-ghost" disabled>リセット</button></div></section>

    <section class="card test glass" id="test"><div id="passage" class="passage neon" lang="ja" dir="ltr" aria-live="polite"></div><div class="screen-readers" aria-live="assertive" aria-atomic="true"><span id="sr-current"></span></div><input id="hiddenInput" class="hidden-input" autocomplete="off" autocapitalize="none" spellcheck="false" inputmode="text"/><div id="keyboard" class="keyboard hidden"></div></section>
    <section class="card metrics glass"><div class="metrics-grid"><div class="metric"><span class="label">WPM</span><span id="wpm" class="value">0</span></div><div class="metric"><span class="label">CPM</span><span id="cpm" class="value">0</span></div><div class="metric"><span class="label">精度</span><span id="accuracy" class="value">100%</span></div><div class="metric"><span class="label">ミス</span><span id="errors" class="value">0</span></div><div class="metric"><span class="label">時間</span><span id="time" class="value">0s</span></div><div class="metric"><span class="label">平均WPM</span><span id="avgWpm" class="value">0</span></div></div><canvas id="sparkline" height="40" role="img"></canvas></section>
  </main>

  <footer class="site-footer"><div class="container"><p>&copy; 2025 Typing Speed Test • <a href="/">Home</a> • <a href="/about.html">About</a> • <a href="/contact.html">Contact</a> • <a href="/terms.html">Terms</a> • <a href="/privacy.html">Privacy</a> • <a href="/disclaimer.html">Disclaimer</a></p></div></footer>
  <script src="../assets/script.js" defer></script>
</body>
</html>
