<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Тест скорости печати с современным интерфейсом и 3D-фоном. WPM, точность и таблица лидеров." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://typingspeedtest.co/ru/" />
  <meta property="og:title" content="Тест Скорости Печати" />
  <meta property="og:description" content="Современный интерфейс с 3D-фоном. WPM, CPM, точность и таблица лидеров." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://typingspeedtest.co/ru/" />
  <title>Тест Скорости Печати</title>
  <link rel="stylesheet" href="../assets/style.css">
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js" defer></script>
</head>
<body>
  <canvas id="bg3d" aria-hidden="true"></canvas>
  <a class="sr-only skip-link" href="#test">Перейти к тесту</a>

  <header class="site-header"><div class="container">
    <div class="brand"><span class="logo" aria-hidden="true">⌨️</span><h1 class="app-title">Тест Скорости Печати</h1></div>
    <div class="header-actions">
      <div class="lang-switch">
        <label for="siteLangSwitch" class="visually-hidden">Язык</label>
        <select id="siteLangSwitch" aria-label="Язык сайта">
          <option value="/">EN</option><option value="/es/">ES</option><option value="/de/">DE</option><option value="/tr/">TR</option><option value="/ar/">AR</option><option value="/fr/">FR</option><option value="/el/">EL</option><option value="/ru/">RU</option><option value="/pt/">PT</option><option value="/cn/">CN</option><option value="/jp/">JP</option>
        </select>
      </div>
      <button id="themeToggle" class="btn btn-ghost" aria-pressed="false">Тёмная</button>
    </div>
  </div></header>

  <main id="main" class="container" role="main">
    <section class="hero card"><div class="hero-content"><h2 class="hero-title">Быстрее. Точнее.</h2><p class="hero-sub">Неоновый интерфейс, 3D-фон и длинные тексты для выносливости.</p></div></section>
    <section class="card controls glass"><div class="controls-grid">
      <div class="control"><label for="modeSelect">Режим</label><select id="modeSelect"><option value="time">Время</option><option value="words">Слова</option></select></div>
      <div class="control" id="timeControl"><label for="timeSelect">Время</label><select id="timeSelect"><option value="15">15s</option><option value="30">30s</option><option value="60" selected>60s</option><option value="120">120s</option><option value="custom">Другое…</option></select><input id="timeCustom" type="number" class="hidden" placeholder="Секунды"></div>
      <div class="control hidden" id="wordsControl"><label for="wordsSelect">Слова</label><select id="wordsSelect"><option value="50">50</option><option value="150" selected>150</option><option value="300">300</option><option value="600">600</option></select></div>
      <div class="control"><label for="langSelect">Язык текста</label><select id="langSelect"><option value="en" selected>English</option><option value="ur">Urdu</option><option value="es">Español</option></select></div>
      <div class="control"><label for="layoutSelect">Клавиатура</label><select id="layoutSelect"><option value="qwerty" selected>QWERTY</option><option value="azerty">AZERTY</option></select></div>
      <div class="control toggles"><div class="toggle"><input type="checkbox" id="showPunct" checked><label for="showPunct">Пунктуация</label></div><div class="toggle"><input type="checkbox" id="strictCaps"><label for="strictCaps">Строчные/прописные</label></div><div class="toggle"><input type="checkbox" id="showKeyboard"><label for="showKeyboard">Подсказки клавиш</label></div><div class="toggle"><input type="checkbox" id="keystrokeLog"><label for="keystrokeLog">Лог</label></div></div>
    </div><details class="custom-text"><summary>Свой текст</summary><textarea id="customText" rows="3" placeholder="Вставьте текст…"></textarea></details><div class="actions"><button id="startBtn" class="btn btn-primary accent">Старт</button><button id="resetBtn" class="btn btn-ghost" disabled>Сброс</button></div></section>

    <section class="card test glass" id="test"><div id="passage" class="passage neon" lang="ru" dir="ltr" aria-live="polite"></div><div class="screen-readers" aria-live="assertive" aria-atomic="true"><span id="sr-current"></span></div><input id="hiddenInput" class="hidden-input" autocomplete="off" autocapitalize="none" spellcheck="false" inputmode="text"/><div id="keyboard" class="keyboard hidden"></div></section>
    <section class="card metrics glass"><div class="metrics-grid"><div class="metric"><span class="label">WPM</span><span id="wpm" class="value">0</span></div><div class="metric"><span class="label">CPM</span><span id="cpm" class="value">0</span></div><div class="metric"><span class="label">Точность</span><span id="accuracy" class="value">100%</span></div><div class="metric"><span class="label">Ошибки</span><span id="errors" class="value">0</span></div><div class="metric"><span class="label">Время</span><span id="time" class="value">0s</span></div><div class="metric"><span class="label">Сред. WPM</span><span id="avgWpm" class="value">0</span></div></div><canvas id="sparkline" height="40" role="img"></canvas></section>
  </main>

  <footer class="site-footer"><div class="container"><p>&copy; 2025 Typing Speed Test • <a href="/">Home</a> • <a href="/about.html">About</a> • <a href="/contact.html">Contact</a> • <a href="/terms.html">Terms</a> • <a href="/privacy.html">Privacy</a> • <a href="/disclaimer.html">Disclaimer</a></p></div></footer>
  <script src="../assets/script.js" defer></script>
</body>
</html>
