<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Download ZIP • Typing Speed Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; margin: 24px; color: #111827; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { color: #374151; }
    button { padding: 10px 14px; border-radius: 8px; border: 1px solid #d1d5db; background: #2563eb; color: #fff; cursor: pointer; }
    code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; }
    ul { line-height: 1.7; }
    .log { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; background: #f9fafb; border: 1px solid #e5e7eb; padding: 10px; border-radius: 8px; max-width: 900px; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha512-fPpKQ34C/oAiA6f2b0L2X8YqJe5IhCnxZL0w8iQmY1D0lyx3mJbC+exn2D8r9cC1lJ8r9l0Rr4i7t8g5m0D2bA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" integrity="sha512-5x3b6o0mG2C4nXw4qzC1m8eQYQk0rF+9kqBz8Cq8Y3z1fn3r0wQ7u9WQW6FQZt0qG8xgq1gq7oC7o2y9pO9NQw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
  <h1>Typing Speed Test — Download ZIP</h1>
  <p>This will package the current project files into a ZIP you can download and run locally.</p>
  <button id="zipBtn">Generate ZIP</button>
  <p id="status"></p>
  <div class="log" id="log" aria-live="polite"></div>

  <script>
    const files = [
      'index.html',
      'README.md',
      'robots.txt',
      'sitemap.xml',
      'assets/style.css',
      'assets/script.js',
      'server/server.js',
      'server/package.json',
      'server/passages.json',
      'server/db.json',
      'server/utils.js',
      'server/tests/wpm.test.js',
      'Dockerfile',
      'docker-compose.yml',
      'api.postman_collection.json'
    ];

    async function fetchText(path) {
      const res = await fetch(new URL('../' + path, window.location.href).toString());
      if (!res.ok) throw new Error('Failed to fetch ' + path + ' (' + res.status + ')');
      return res.text();
    }

    function log(msg) {
      const el = document.getElementById('log');
      el.textContent += msg + '\n';
    }

    document.getElementById('zipBtn').addEventListener('click', async () => {
      const status = document.getElementById('status');
      status.textContent = 'Building zip...';
      document.getElementById('log').textContent = '';
      try {
        const zip = new JSZip();
        for (const path of files) {
          log('Adding ' + path + ' ...');
          const txt = await fetchText(path);
          zip.file(path, txt);
        }
        const blob = await zip.generateAsync({ type: 'blob' });
        saveAs(blob, 'typing-speed-test.zip');
        status.textContent = 'Done. ZIP downloaded.';
      } catch (e) {
        console.error(e);
        status.textContent = 'Error: ' + e.message;
        log('Error: ' + e.stack);
      }
    });
  </script>
</body>
</html>
