<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="اختبار سرعة الكتابة بواجهة حديثة وخلفية ثلاثية الأبعاد. كلمات في الدقيقة، الدقة، ولوحة الصدارة." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://typingspeedtest.co/ar/" />
  <meta property="og:title" content="اختبار سرعة الكتابة" />
  <meta property="og:description" content="واجهة حديثة مع خلفية ثلاثية الأبعاد. إحصاءات لحظية ودقة ولوحة صدارة." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://typingspeedtest.co/ar/" />
  <title>اختبار سرعة الكتابة</title>
  <link rel="stylesheet" href="../assets/style.css">
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js" defer></script>
</head>
<body>
  <canvas id="bg3d" aria-hidden="true"></canvas>
  <a class="sr-only skip-link" href="#test">انتقل إلى الاختبار</a>

  <header class="site-header" role="banner">
    <div class="container">
      <div class="brand"><span class="logo" aria-hidden="true">⌨️</span><h1 class="app-title">اختبار سرعة الكتابة</h1></div>
      <div class="header-actions">
        <div class="lang-switch">
          <label for="siteLangSwitch" class="visually-hidden">اللغة</label>
          <select id="siteLangSwitch" aria-label="لغة الموقع">
            <option value="/">EN</option><option value="/es/">ES</option><option value="/de/">DE</option><option value="/tr/">TR</option><option value="/ar/">AR</option><option value="/fr/">FR</option><option value="/el/">EL</option><option value="/ru/">RU</option><option value="/pt/">PT</option><option value="/cn/">CN</option><option value="/jp/">JP</option>
          </select>
        </div>
        <button id="themeToggle" class="btn btn-ghost" aria-pressed="false" aria-label="تبديل النمط">داكن</button>
      </div>
    </div>
  </header>

  <main id="main" class="container" role="main">
    <section class="hero card"><div class="hero-content"><h2 class="hero-title">أسرع. أدق.</h2><p class="hero-sub">واجهة نيون وخلفية ثلاثية الأبعاد ونصوص طويلة لتدريب التحمل.</p></div></section>

    <section class="card controls glass" role="region" aria-labelledby="controls-heading">
      <h2 id="controls-heading" class="visually-hidden">التحكم</h2>
      <div class="controls-grid">
        <div class="control"><label for="modeSelect">الوضع</label><select id="modeSelect"><option value="time">زمن</option><option value="words">كلمات</option></select></div>
        <div class="control" id="timeControl"><label for="timeSelect">الوقت</label><select id="timeSelect"><option value="15">15s</option><option value="30">30s</option><option value="60" selected>60s</option><option value="120">120s</option><option value="custom">مخصص…</option></select><input id="timeCustom" type="number" min="5" step="5" placeholder="ثوانٍ" class="hidden" aria-label="ثوانٍ مخصصة"></div>
        <div class="control hidden" id="wordsControl"><label for="wordsSelect">الكلمات</label><select id="wordsSelect"><option value="50">50</option><option value="150" selected>150</option><option value="300">300</option><option value="600">600</option></select></div>
        <div class="control"><label for="langSelect">لغة النص</label><select id="langSelect"><option value="en" selected>English</option><option value="ur">Urdu</option><option value="es">Español</option></select></div>
        <div class="control"><label for="layoutSelect">لوحة المفاتيح</label><select id="layoutSelect"><option value="qwerty" selected>QWERTY</option><option value="azerty">AZERTY</option></select></div>
        <div class="control toggles"><div class="toggle"><input type="checkbox" id="showPunct" checked><label for="showPunct">علامات الترقيم</label></div><div class="toggle"><input type="checkbox" id="strictCaps"><label for="strictCaps">أحرف كبيرة دقيقة</label></div><div class="toggle"><input type="checkbox" id="showKeyboard"><label for="showKeyboard">تلميحات لوحة المفاتيح</label></div><div class="toggle"><input type="checkbox" id="keystrokeLog"><label for="keystrokeLog">سجل الضغطات</label></div></div>
      </div>
      <details class="custom-text"><summary>نص مخصص</summary><textarea id="customText" rows="3" placeholder="ألصق نصك هنا…"></textarea></details>
      <div class="actions"><button id="startBtn" class="btn btn-primary accent">ابدأ</button><button id="resetBtn" class="btn btn-ghost" disabled>إعادة ضبط</button></div>
    </section>

    <section class="card test glass" id="test"><div id="passage" class="passage neon" lang="ar" dir="rtl" aria-live="polite"></div><div class="screen-readers" aria-live="assertive" aria-atomic="true"><span id="sr-current"></span></div><input id="hiddenInput" class="hidden-input" autocomplete="off" autocapitalize="none" spellcheck="false" inputmode="text" aria-label="إدخال"/><div id="keyboard" class="keyboard hidden" aria-hidden="true"></div></section>
    <section class="card metrics glass"><div class="metrics-grid"><div class="metric"><span class="label">WPM</span><span id="wpm" class="value">0</span></div><div class="metric"><span class="label">CPM</span><span id="cpm" class="value">0</span></div><div class="metric"><span class="label">الدقة</span><span id="accuracy" class="value">100%</span></div><div class="metric"><span class="label">الأخطاء</span><span id="errors" class="value">0</span></div><div class="metric"><span class="label">الوقت</span><span id="time" class="value">0s</span></div><div class="metric"><span class="label">متوسط WPM</span><span id="avgWpm" class="value">0</span></div></div><canvas id="sparkline" height="40" role="img" aria-label="WPM"></canvas></section>
  </main>

  <footer class="site-footer"><div class="container"><p>&copy; 2025 Typing Speed Test • <a href="/">Home</a> • <a href="/about.html">About</a> • <a href="/contact.html">Contact</a> • <a href="/terms.html">Terms</a> • <a href="/privacy.html">Privacy</a> • <a href="/disclaimer.html">Disclaimer</a></p></div></footer>
  <script src="../assets/script.js" defer></script>
</body>
</html>
